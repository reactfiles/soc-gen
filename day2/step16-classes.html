<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classes</title>
    <script>
        /* 
        class Hero {
                properties
                    private
                        getters
                        setters
                    public
                    static
                //---------------
                constructor
                    super
                //---------------
                methods
                    private
                    public
                    static
                }
        */
       class Person{
        ability = "i can walk";
        constructor(pability){
            this.ability = pability;
        }
       };

       class Hero extends Person{
            /* Public */
            title;
            firstname;
            lastname;
            #mission = "Save the world";
            static version = 1001;
            constructor(fname, lname, title, hability){
                super(hability);
                this.firstname = fname;
                this.lastname = lname;
                this.title = title;
            }
            fullname(){
                return this.firstname+" "+this.lastname;
            }
            saymission(){
                return this.#mission;
            }
            get accessMission(){
               return this.#mission 
            }
            set accessMission(nmission){
                this.#mission = nmission;
            }
       };

       let hero = new Hero("Bruce","Wayne","Batman", "I can fly");
       console.log(hero.title, hero.firstname, hero.lastname);
       console.log(hero.fullname());
       console.log(hero.saymission());
       console.log(hero.accessMission);
       hero.accessMission = "Save Gotham";
       console.log(hero.accessMission);
       console.log(hero.version);
       console.log(Hero.version);
       console.log("############################");
       console.log(hero.ability);
    </script>
</head>

</body>
</html>
