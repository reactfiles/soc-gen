<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arrays sorting</title>
    <script>
        // array sorting
        var favnums = [11,99,7,88,4,2,9,17,16,18,29,20];
        console.log(favnums.sort());
        function sortcomparefun(num1, num2){
            if(num1 > num2){
                return 1
            }else if(num1 < num2){
                return -1
            }else{
                return 0
            }
        } 
        /* 
        */
        /* function sortcomparefun(num1, num2){
           return num1 - num2
        } */
        console.log(favnums.sort(sortcomparefun));
    </script>
