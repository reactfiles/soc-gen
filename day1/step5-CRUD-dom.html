<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Remove Event Listeners</title>
    <style>
        #container{
            width: 1016px;
            height: 400px;
            background-color: silver;
            margin: 10px auto;
            overflow: auto;
        }
        #container div{
            width: 100px;
            height: 100px;
            background-color: rgb(233, 27, 27);
            margin: 5px;
            font-family: sans-serif;
            text-align: center;
            color: whitesmoke;
            font-size: 30px;
            text-align: center;
            line-height: 100px;
            display: inline-block;
        }
        button{
            margin: 0px auto;
            display: block;
            padding: 10px;
        }
    </style>
    <script>
        var count = 1;
        function addClickHandler(){
           var elm = document.createElement("div");
           elm.textContent = count;
           document.getElementById("container").appendChild(elm);
           count++;
        }
        /* function selectBox(){
            // document.getElementById("container").children[0].textContent = "selected"
            document.getElementById("container").children[1].setAttribute("style","background-color :green")
        } */
        function removeFirstBox(){
            var container = document.getElementById("container");
            var boxToRemove = container.firstChild
            if(boxToRemove){
                container.removeChild(boxToRemove);
            }else{
                alert("nothing to remove")
            }
        }
        function removeLastBox(){
            var container = document.getElementById("container");
            var boxToRemove = container.lastChild;
            if(boxToRemove){
                container.removeChild(boxToRemove);
            }else{
                alert("nothing to remove")
            }
        }
        function init(){
            document.getElementsByTagName("button")[0].addEventListener("click", addClickHandler);
            document.getElementsByTagName("button")[1].addEventListener("click", removeFirstBox);
            document.getElementsByTagName("button")[2].addEventListener("click", removeLastBox);
        };
        document.addEventListener("DOMContentLoaded", init);
    </script>
</head>
<body>
    <button>Add Box</button>
    <button>Remove First Box</button>
    <button>Remove Last Box</button>
    <!-- <button>select 1st</button> -->
    <div id="container"></div>
</body>
</html>
